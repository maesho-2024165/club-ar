<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script>
      // スコアを記憶する箱（変数）を用意します
      let score = 0;

      AFRAME.registerComponent('target-handler', {
        init: function () {
          const el = this.el;
          const scoreText = document.querySelector('#score-text');
          const hitSound = document.querySelector('#hit-sound');

          // 的がクリックされた時の動き
          el.addEventListener('click', () => {
            // 1. 効果音を鳴らす（最初から再生し直す）
            if(hitSound) {
              hitSound.currentTime = 0; 
              hitSound.play();
            }

            // 2. スコアを100点増やして、画面の文字を書き換える
            score += 100;
            scoreText.setAttribute('value', 'SCORE: ' + score);

            // 3. 爽快な演出（金色に光らせて、少し大きくする）
            el.setAttribute('color', '#FFD700'); // ゴールド色
            el.setAttribute('scale', '1.5 1.5 1.5'); // 1.5倍の大きさ

            // 0.15秒（150ミリ秒）後に、元に戻して別の場所へ移動させる
            setTimeout(() => {
              this.respawn();
            }, 150);
          });
        },
        respawn: function () {
          const el = this.el;
          // 色とサイズを元の「赤色」「通常の大きさ」に戻す
          el.setAttribute('color', 'red');
          el.setAttribute('scale', '1 1 1');

          // 新しいランダムな場所へ移動
          const newX = (Math.random() - 0.5) * 4;
          const newY = Math.random() * 2 + 0.5;
          const newZ = (Math.random() - 0.5) * 4;
          el.setAttribute('position', {x: newX, y: newY, z: newZ});
        }
      });
    </script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <audio id="hit-sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="fuse: false; rayOrigin: mouse">
      
      <a-entity camera>
        <a-text id="score-text" value="SCORE: 0" position="0 -0.5 -1" color="yellow" align="center" width="3"></a-text>
      </a-entity>

      <a-marker preset="hiro">
        <a-sphere 
          target-handler 
          position="0 1 -2" 
          radius="0.3" 
          color="red">
        </a-sphere>
      </a-marker>
      
    </a-scene>
  </body>
</html>
