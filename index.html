<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script>
      let score = 0;

      // 画面のどこをタップしても反応するように改良
      window.addEventListener('click', function () {
        const target = document.querySelector('#target-sphere');
        const scoreText = document.querySelector('#score-text');
        const hitSound = document.querySelector('#hit-sound');

        // 音を鳴らす
        if(hitSound) { hitSound.currentTime = 0; hitSound.play(); }

        // スコア加算
        score += 100;
        scoreText.setAttribute('value', 'SCORE: ' + score);

        // ヒット演出（一瞬大きく、金色に）
        target.setAttribute('color', '#FFD700');
        target.setAttribute('scale', '2 2 2');

        setTimeout(() => {
          // ランダム移動（少し範囲を狭めて画面に収まりやすくします）
          const newX = (Math.random() - 0.5) * 2;
          const newY = Math.random() * 1.5 + 0.5;
          const newZ = (Math.random() - 0.5) * 2;
          target.setAttribute('position', {x: newX, y: newY, z: newZ});
          target.setAttribute('color', 'red');
          target.setAttribute('scale', '1 1 1');
        }, 100);
      });
    </script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <audio id="hit-sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
      
      <a-entity camera>
        <a-text id="score-text" value="SCORE: 0" position="0 0.6 -1" color="yellow" align="center" width="4"></a-text>
        <a-text value="TAP ANYWHERE TO SHOOT!" position="0 -0.8 -1" color="white" align="center" width="2"></a-text>
      </a-entity>

      <a-marker preset="hiro" emitevents="true">
        <a-sphere id="target-sphere" position="0 1 -2" radius="0.3" color="red"></a-sphere>
      </a-marker>
      
    </a-scene>
  </body>
</html>
